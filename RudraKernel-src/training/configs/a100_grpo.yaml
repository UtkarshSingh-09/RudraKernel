model_name: unsloth/Qwen2.5-4B-Instruct-bnb-4bit
max_seq_length: 2048
load_in_4bit: true

num_train_epochs: 3
num_mini_batches: 4
learning_rate: 5.0e-5
weight_decay: 0.01
warmup_ratio: 0.1

trajectory_episodes: 200
max_trajectory_length: 384

# A100 40GB: can afford bigger batch
gradient_accumulation_steps: 4
per_device_train_batch_size: 4

log_to_wandb: false
wandb_project: rudra-kernel-grpo
output_dir: artifacts/training/unsloth

seed: 42
max_env_steps: 10
