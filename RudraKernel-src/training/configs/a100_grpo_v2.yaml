model_name: unsloth/Qwen2.5-3B-Instruct-unsloth-bnb-4bit
max_seq_length: 1024
load_in_4bit: true

# Train 3: Resume from Train 2 — fits in 3 hours on A100
num_train_epochs: 3
num_mini_batches: 4
learning_rate: 1.0e-4
weight_decay: 0.01
warmup_ratio: 0.03

trajectory_episodes: 200
max_trajectory_length: 256

# A100 80GB: maximize throughput
gradient_accumulation_steps: 2
per_device_train_batch_size: 8

log_to_wandb: false
wandb_project: rudra-kernel-grpo
output_dir: artifacts/training/unsloth

# Resume from Train 2 LoRA (backup stays untouched)
resume_from_lora: UtkarshSingh09/siege-grpo-lora

# Push v2 to separate repo
hub_model_id: UtkarshSingh09/siege-grpo-lora-v2

seed: 43
max_env_steps: 10
